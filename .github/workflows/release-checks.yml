name: Release Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  publish-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release flow
        run: npm run release:check
