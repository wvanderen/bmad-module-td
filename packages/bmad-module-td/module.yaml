code: td-integration
name: "TD Integration"
header: "BMAD + td CLI Integration"
subheader: "Connect planning artifacts to task management"
description: |
  Integrates BMAD planning artifacts with td CLI task management using a focused command model.

  **Philosophy:** td is state, BMAD is structure
  - BMAD `.md` files hold structured planning artifacts (epics, stories, architecture)
  - td issues hold execution state (status, dependencies, reviews)
  - sidecar provides observability

  **Key Features:**
  - initialize: Accept-default onboarding for greenfield and brownfield projects
  - setup-validation: Define configurable validation methodology and quality gates
  - next-step: Unified executor for review, implementation, and epic workflow actions
  - validate-prd: Check completed work against PRD requirements, create td gaps, and continue execution

  **Requirements:**
  - td CLI installed and initialized
  - Git repository
  - BMM module (planning artifacts)

default_selected: false

# Module dependencies
depends_on:
  - bmm

# Custom configuration questions
td_cli_path:
  prompt: "Where is your td CLI installed? (or 'td' if in PATH)"
  default: "td"
  result: "{value}"

auto_sync:
  prompt: "Enable auto-sync between story files and td?"
  default: "enabled"
  result: "{value}"
  single-select:
    - value: "enabled"
      label: "Enabled - Auto-sync on story create and task complete"
    - value: "disabled"
      label: "Disabled - Manual sync only"

session_prefix:
  prompt: "Session name prefix for td sessions?"
  default: "bmad-story"
  result: "{value}"

validation_methodology_file:
  prompt: "Where should validation methodology config be stored?"
  default: "{config:output_folder}/validation-methodology.yaml"
  result: "{value}"

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder
