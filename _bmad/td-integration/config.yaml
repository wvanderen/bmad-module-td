# TD-Integration Module Configuration
# Integrates BMAD planning artifacts with td CLI task management
# Version: 1.0.0

# Module metadata
module_name: td-integration
module_description: "BMAD expansion for td CLI integration - td provides state, BMAD provides structure"

# Inherit from core config
config_inheritance:
  - "{project-root}/_bmad/core/config.yaml"

# Critical variables (inherit from parent configs)
user_name: "{config_inheritance:user_name}"
communication_language: "{config_inheritance:communication_language}"
document_output_language: "{config_inheritance:document_output_language}"

# td CLI settings
td_settings:
  # Auto-sync behavior
  auto_sync_on_story_create: true
  auto_sync_on_task_complete: true
  auto_sync_on_review: true
  
  # Session management
  session_prefix: "bmad-story"
  enforce_separate_review_session: true
  
  # Issue tagging
  default_tags:
    - bmad
  epic_tag: "epic"
  story_tag: "story"
  task_tag: "task"
  
  # Priority mapping (BMAD priority → td priority)
  priority_mapping:
    critical: "P0"
    high: "P1"
    medium: "P2"
    low: "P3"

# File paths
paths:
  installed_path: "{project-root}/_bmad/td-integration"
  planning_artifacts: "{project-root}/_bmad-output"
  implementation_artifacts: "{project-root}/_bmad-output/stories"
  
  # Data files
  status_mapping: "{installed_path}/data/td-status-mapping.yaml"
  field_schema: "{installed_path}/data/td-field-schema.yaml"
  
  # Templates
  story_template: "{installed_path}/templates/td-story-template.md"
  
  # Workflows
  create_td_story_workflow: "{installed_path}/workflows/create-td-story"
  td_story_dev_workflow: "{installed_path}/workflows/td-story-dev"
  td_story_review_workflow: "{installed_path}/workflows/td-story-review"
  sync_story_td_workflow: "{installed_path}/workflows/sync-story-td"

# Integration with BMM module
bmm_integration:
  create_story_workflow: "{project-root}/_bmad/bmm/workflows/4-implementation/create-story"
  dev_story_workflow: "{project-root}/_bmad/bmm/workflows/4-implementation/dev-story"
  code_review_workflow: "{project-root}/_bmad/bmm/workflows/4-implementation/code-review"
  sprint_status_file: "{implementation_artifacts}/sprint-status.yaml"

# Sync settings
sync:
  # Direction preference when drift detected
  conflict_resolution: "ask"  # ask, prefer_td, prefer_story
  
  # Auto-sync intervals (in minutes, 0 = disabled)
  auto_sync_interval: 0
  
  # Fields to sync
  sync_fields:
    - status
    - tasks
    - completion_notes
    - file_list
