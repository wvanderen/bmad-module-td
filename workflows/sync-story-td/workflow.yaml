name: sync-story-td
description: "Bidirectional sync between BMAD story file and td issues. Detects drift and reconciles state. Use when states may be out of sync."

# Critical variables from config (inherited from core)
user_name: "{config:user_name}"
communication_language: "{config:communication_language}"
date: system-generated

# Workflow components (relative paths from module root)
instructions: "instructions.xml"

# Data files (relative paths from module root)
status_mapping: "data/td-status-mapping.yaml"
td_ops: "tools/td-ops.xml"

# Sync context
story_file: ""
td_epic_id: ""
sync_direction: "bidirectional" # bidirectional, story-to-td, td-to-story
conflict_resolution: "ask" # ask, prefer-td, prefer-story

# Drift tracking
drift_report: []
sync_timestamp: ""
